services:
  understory:
    build: .
    ports:
      - "3800:3800"
    volumes:
      - ./sample-bundle:/bundle
    environment:
      BUNDLE_ROOT: /bundle
      AUTH_TOKEN: ${AUTH_TOKEN:-}
      # Primary model
      LLM_API_BASE_URL: ${LLM_API_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_FORMAT: ${LLM_API_FORMAT:-openai}
      LLM_MODEL: ${LLM_MODEL:-}
      # Fallback model
      LLM_FALLBACK_API_BASE_URL: ${LLM_FALLBACK_API_BASE_URL:-}
      LLM_FALLBACK_API_KEY: ${LLM_FALLBACK_API_KEY:-}
      LLM_FALLBACK_API_FORMAT: ${LLM_FALLBACK_API_FORMAT:-openai}
      LLM_FALLBACK_MODEL: ${LLM_FALLBACK_MODEL:-}
      LLM_FALLBACK_ALLOW_FOR: ${LLM_FALLBACK_ALLOW_FOR:-query}
      # Legacy compat (still supported)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      LLAMACPP_BASE_URL: ${LLAMACPP_BASE_URL:-}
      LLAMACPP_API_KEY: ${LLAMACPP_API_KEY:-}
      LOCAL_BASE_URL: ${LOCAL_BASE_URL:-}
      LOCAL_API_KEY: ${LOCAL_API_KEY:-}
      GIT_AUTOCOMMIT: ${GIT_AUTOCOMMIT:-false}
      # Agent tuning
      LLM_MAX_STEPS: ${LLM_MAX_STEPS:-12}                       # max tool-calling steps per run
      LLM_MUTATION_TEMPERATURE: ${LLM_MUTATION_TEMPERATURE:-0.2} # sampling temperature for mutations
      # Thinking / reasoning (per-mode: csv of query,mutate,chat,maintain, or "*")
      LLM_THINKING: ${LLM_THINKING:-}
      LLM_THINKING_BUDGET: ${LLM_THINKING_BUDGET:-8000}          # anthropic thinking token budget
      LLM_REASONING_EFFORT: ${LLM_REASONING_EFFORT:-}            # openai-format reasoning_effort
      LLM_EXTRA_BODY: ${LLM_EXTRA_BODY:-}                        # extra JSON merged into openai request bodies
      # Prompt sizing
      UNDERSTORY_TREE_BUDGET: ${UNDERSTORY_TREE_BUDGET:-4000}    # char budget for the tree in the system prompt
      # Hybrid search: embeddings (empty base URL → FTS/BM25-only)
      LLM_EMBEDDING_API_BASE_URL: ${LLM_EMBEDDING_API_BASE_URL:-} # OpenAI-compatible /v1/embeddings endpoint
      LLM_EMBEDDING_API_KEY: ${LLM_EMBEDDING_API_KEY:-}          # default "not-needed"
      LLM_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL:-}              # empty → discovered from /v1/models
      LLM_EMBEDDING_DIMS: ${LLM_EMBEDDING_DIMS:-}               # empty → learned from first response
    restart: unless-stopped
